<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Google Authenticator 生成器</title>
    <meta name="description" content="Google Authenticator 实时验证码生成页面" />
    <link rel="stylesheet" href="./styles.css" />
    <script type="module" src="./app.js"></script>
  </head>
  <body>
    <main class="page">
      <h1>Google Authenticator 实时生成器</h1>

      <div class="input-row">
        <input
          id="secretInput"
          type="text"
          inputmode="text"
          autocomplete="off"
          autocapitalize="off"
          spellcheck="false"
          placeholder="请输入你的 Setup Key"
        />
        <button id="clearButton" type="button">清空输入</button>
      </div>

      <section id="resultPanel" class="result-panel" hidden>
        <p class="label">当前 6 位验证码：</p>
        <div id="codeOutput" class="code">000000</div>
        <p id="countdownText" class="countdown"></p>
        <button id="copyButton" type="button">复制验证码</button>
      </section>

      <p id="errorText" class="error" hidden></p>
    </main>
  </body>
</html>
